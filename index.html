<!DOCTYPE html>
<html>

<head>
  <title>Diet Dashboard</title>

  <!-- ICONS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- ✅ ADDED CHART -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      background: #f3f4f6;
      color: #1f2937;
      min-height: 100vh;
    }

    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      width: 360px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    input {
      width: 100%;
      height: 45px;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
    }

    .password-box {
      position: relative;
    }

    .password-box i {
      position: absolute;
      right: 12px;
      top: 14px;
      cursor: pointer;
    }

    button {
      width: 100%;
      height: 45px;
      border-radius: 10px;
      margin-bottom: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .login-btn {
      background: #2563eb;
      color: white;
    }

    .google-btn {
      background: white;
      border: 1px solid #d1d5db;
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
    }

    #dashboard {
      display: none;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: #2563eb;
      color: white;
    }

    .header button {
      width: auto;
      height: auto;
      padding: 8px 18px;
      border-radius: 8px;
      background: #ef4444;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .header button:hover {
      background: #dc2626;
    }
  </style>
</head>

<body>

  <div id="loginPage" class="login-container">
    <div class="login-box">
      <h2>Welcome back</h2>

      <input type="email" id="email" placeholder="Email" maxlength="50">

      <div class="password-box">
        <input type="password" id="password" placeholder="Password" minlength="6" maxlength="20">
        <i class="fa fa-eye" onclick="togglePassword()"></i>
      </div>

      <button class="login-btn" onclick="login()">Sign In</button>

      <button class="google-btn" onclick="googleLogin()">
        <i class="fab fa-google"></i> Continue with Google
      </button>

      <button class="google-btn" onclick="githubLogin()">
        <i class="fab fa-github"></i> Continue with GitHub
      </button>
    </div>
  </div>

  <div id="dashboard">
    <div class="header">
      <h2>Diet Dashboard</h2>
      <button onclick="logout()">Logout</button>
    </div>

    <h3 style="padding:20px;">Welcome, <span id="userName"></span></h3>

    <!-- ✅ ADDED BUTTON -->
    <div style="padding:20px;">
      <button onclick="loadData()">🔄 Load Data</button>

      <!-- ✅ ADDED CHART -->
      <canvas id="barChart"></canvas>
    </div>
  </div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      GoogleAuthProvider,
      GithubAuthProvider,
      signInWithPopup
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBwMdd7WwmnBG_Fzl4n2_Tn8Aum209kHqg",
      authDomain: "diet-dashboard-be3ce.firebaseapp.com",
      projectId: "diet-dashboard-be3ce",
      storageBucket: "diet-dashboard-be3ce.appspot.com",
      messagingSenderId: "254710104011",
      appId: "1:254710104011:web:484010675a4d4ac0a6004e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.login = async function () {
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;

      try {
        const user = await signInWithEmailAndPassword(auth, email, password);
        showDashboard(user.user.email);
      } catch (error) {
        alert(error.message);
      }
    };

    window.googleLogin = async function () {
      const provider = new GoogleAuthProvider();
      const result = await signInWithPopup(auth, provider);
      showDashboard(result.user.email);
    };

    window.githubLogin = async function () {
      const provider = new GithubAuthProvider();
      const result = await signInWithPopup(auth, provider);
      showDashboard(result.user.email);
    };

    function showDashboard(email) {
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      document.getElementById("userName").innerText = email;
    }

    window.logout = function () {
      location.reload();
    };

    window.togglePassword = function () {
      let pass = document.getElementById("password");
      pass.type = pass.type === "password" ? "text" : "password";
    };

    // ✅ ADDED API
    const API_URL = "https://moin-processor-p3-h0f2azajhnh9g5fu.westus3-01.azurewebsites.net/api/nutritional_insights?code=drpE09tzfzbLuMuyEshxwla6-iWQiAoIAG2CXX0Q2aKxAzFuAuI1DQ==";
    // ✅ ADDED FUNCTION
    window.loadData = async function () {
      try {
        const response = await fetch(API_URL);
        const data = await response.json();

        console.log(data);

        let labels = Object.keys(data);
        let protein = Object.values(data).map(d => d["Protein(g)"]);

        const ctx = document.getElementById("barChart").getContext("2d");

        new Chart(ctx, {
          type: "bar",
          data: {
            labels: labels,
            datasets: [{
              label: "Protein (g)",
              data: protein
            }]
          }
        });

      } catch (error) {
        console.error(error);
        alert("API error");
      }
    };

  </script>

</body>

</html>
